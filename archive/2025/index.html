<script>
  const THEME_KEY = 'isNight'

  function setIsNight(isNight) {
    localStorage.setItem(THEME_KEY, isNight)
  }

  function getIsNight() {
    return localStorage.getItem(THEME_KEY)
  }

  function applyTheme(themeName) {
    document.documentElement.className = themeName
  }

  function syncThemeButton() {
    const switcher = document.getElementsByClassName('theme-switcher')[0]
    if (!switcher) return
    const isDark = document.documentElement.className === 'dark'
    switcher.textContent = isDark ? 'Dark' : 'Light'
    switcher.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme')
  }

  function switchTheme() {
    const isDark = document.documentElement.className === 'dark'
    if (isDark) {
      applyTheme('light')
      setIsNight('false')
    } else {
      applyTheme('dark')
      setIsNight('true')
    }
    syncThemeButton()
  }

  let isNight = getIsNight()
  if (isNight == null) {
    isNight = 'false'
    setIsNight('false')
  }
  applyTheme(isNight === 'true' ? 'dark' : 'light')
  document.addEventListener('DOMContentLoaded', syncThemeButton)
</script>
